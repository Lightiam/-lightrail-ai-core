# Tiny Tapeout project information
project:
  title:        "LightRail AI Tensor MAC Core"
  author:       "LightRail Team"
  discord:      ""
  description:  "SIMD dual-lane 4-bit tensor MAC core for AI dot-product acceleration. Two parallel MAC lanes (Lane A via ui_in, Lane B via uio_in) accumulate weight*activation products every clock cycle. Dot product of a 2N-element vector pair computed in N cycles: result = uo_out + uio_out."
  language:     "Verilog"
  clock_hz:     50000000

  # 1x1 tile - both 4x4 multipliers + 2x 8-bit accumulators fit comfortably
  tiles: "1x1"

  top_module: "tt_um_lightrail_ai_core"

  source_files:
    - "project.v"

# Pin assignments - DO NOT delete or add any pins
pinout:
  # Inputs - Lane A (dedicated input pins)
  ui[0]: "input_a_bit0"    # Lane A activation bit 0
  ui[1]: "input_a_bit1"    # Lane A activation bit 1
  ui[2]: "input_a_bit2"    # Lane A activation bit 2
  ui[3]: "input_a_bit3"    # Lane A activation bit 3
  ui[4]: "weight_a_bit0"   # Lane A weight bit 0
  ui[5]: "weight_a_bit1"   # Lane A weight bit 1
  ui[6]: "weight_a_bit2"   # Lane A weight bit 2
  ui[7]: "weight_a_bit3"   # Lane A weight bit 3

  # Outputs - Lane A accumulator
  uo[0]: "acc_a_bit0"
  uo[1]: "acc_a_bit1"
  uo[2]: "acc_a_bit2"
  uo[3]: "acc_a_bit3"
  uo[4]: "acc_a_bit4"
  uo[5]: "acc_a_bit5"
  uo[6]: "acc_a_bit6"
  uo[7]: "acc_a_bit7"

  # Bidirectional - Lane B input (in) / Lane B accumulator (out)
  # uio_oe = 0xFF so all pins are driven as outputs carrying acc_b.
  # uio_in still feeds weight_b[7:4] and input_b[3:0] to the Lane B MAC.
  uio[0]: "input_b_bit0"
  uio[1]: "input_b_bit1"
  uio[2]: "input_b_bit2"
  uio[3]: "input_b_bit3"
  uio[4]: "weight_b_bit0"
  uio[5]: "weight_b_bit1"
  uio[6]: "weight_b_bit2"
  uio[7]: "weight_b_bit3"

# Do not change!
yaml_version: 6
