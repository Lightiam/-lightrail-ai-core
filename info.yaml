# Tiny Tapeout project information
project:
  title:        "LightRail AI Tensor MAC Core"
  author:       "LightRail Team"
  discord:      ""
  description:  "SIMD dual-lane 4-bit tensor MAC core. Two parallel MACs accumulate weight*activation every clock. Dot product of a 2N-element vector pair in N cycles: dot = uo_out + uio_out."
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "1x1"

  top_module:  "tt_um_lightrail_ai_core"

  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "input_a_0"
  ui[1]: "input_a_1"
  ui[2]: "input_a_2"
  ui[3]: "input_a_3"
  ui[4]: "weight_a_0"
  ui[5]: "weight_a_1"
  ui[6]: "weight_a_2"
  ui[7]: "weight_a_3"

  # Outputs
  uo[0]: "acc_a_0"
  uo[1]: "acc_a_1"
  uo[2]: "acc_a_2"
  uo[3]: "acc_a_3"
  uo[4]: "acc_a_4"
  uo[5]: "acc_a_5"
  uo[6]: "acc_a_6"
  uo[7]: "acc_a_7"

  # Bidirectional pins
  uio[0]: "input_b_0"
  uio[1]: "input_b_1"
  uio[2]: "input_b_2"
  uio[3]: "input_b_3"
  uio[4]: "weight_b_0"
  uio[5]: "weight_b_1"
  uio[6]: "weight_b_2"
  uio[7]: "weight_b_3"

# Do not change!
yaml_version: 6
