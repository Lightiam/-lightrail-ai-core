# Tiny Tapeout project information
project:
  title:        "LightRail AI Gen3 - LR-P8A Photonic Inference Core"
  author:       "LightRail Team"
  discord:      ""
  description:  "4-channel photonic AI post-processor: signed MZI weight x unsigned ADC per channel (A-D), saturating 8-bit signed accumulators, per-output ReLU. Digital back-end for the LR-P8A PCIe photonic accelerator."
  language:     "Verilog"
  clock_hz:     50000000

  tiles: "1x1"

  top_module:  "tt_um_lightrail_ai_core"

  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "adc_in_0"
  ui[1]: "adc_in_1"
  ui[2]: "adc_in_2"
  ui[3]: "adc_in_3"
  ui[4]: "weight_0"
  ui[5]: "weight_1"
  ui[6]: "weight_2"
  ui[7]: "weight_3"

  # Outputs
  uo[0]: "ch_out_0"
  uo[1]: "ch_out_1"
  uo[2]: "ch_out_2"
  uo[3]: "ch_out_3"
  uo[4]: "ch_out_4"
  uo[5]: "ch_out_5"
  uo[6]: "ch_out_6"
  uo[7]: "ch_out_7"

  # Bidirectional pins
  uio[0]: "ch_sel_0"
  uio[1]: "ch_sel_1"
  uio[2]: "relu_en"
  uio[3]: "ch_clear"
  uio[4]: "neg_a"
  uio[5]: "neg_b"
  uio[6]: "neg_c"
  uio[7]: "neg_d"

# Do not change!
yaml_version: 6
